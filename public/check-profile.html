<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка профиля | В процессе</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="/src/check-profile.js" defer></script>
</head>
<body class="bg-light">
    <div class="check-container">
        <!-- Индикатор загрузки -->
        <div id="loading">
            <div class="spinner mb-3">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="30">
                        <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
            <p class="mb-0">Перенаправление...</p>
            <p id="debugInfo" class="text-muted small" style="display: none;"></p>
        </div>

        <!-- Карточка нового пользователя -->
        <div id="newUserCard" class="card profile-card" style="display: none;">
            <div class="card-body">
                <div class="mb-3">
                    <img src="/logo.png" alt="Logo" class="logo-large">
                </div>
                <h3 class="card-title">Добро пожаловать!</h3>
                <p class="card-text text-muted">
                    Давайте заполним ваш профиль. <strong>Имя и Фамилия обязательны</strong> для начала работы.
                </p>
                <p class="text-muted" id="userIdentifier" style="font-size: 0.9rem;"></p>
                <div class="d-grid gap-2">
                    <a href="profile.html" class="btn btn-primary btn-lg">
                        Заполнить профиль
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

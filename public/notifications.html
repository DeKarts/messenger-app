<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уведомления | В процессе</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="/js/notifications.js" defer></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #1e3a5f 0%, #0f2942 100%) !important; box-shadow: 0 2px 8px rgba(30, 58, 95, 0.3);">
        <div class="container">
            <a class="navbar-brand" href="index.html" style="display: flex; align-items: center; gap: 10px;">
                <img src="/logo.png" alt="Logo" style="height: 32px; object-fit: contain;">
                <span style="color: white;">В процессе</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Чаты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Профиль</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="notifications.html">
                            Уведомления
                            <span id="notifBadge" class="badge badge-new" style="display: none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">Выйти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="row">
            <div class="col-md-10 mx-auto">
                <h4 class="mb-3" style="color: #4f46e5; font-weight: 700;">Запросы в друзья</h4>
                
                <!-- Входящие запросы -->
                <div class="card mb-3">
                    <div class="card-header py-2">
                        <h6 class="mb-0">Входящие запросы</h6>
                    </div>
                    <div class="card-body py-2" id="incomingRequests">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Исходящие запросы -->
                <div class="card">
                    <div class="card-header py-2">
                        <h6 class="mb-0">Исходящие запросы</h6>
                    </div>
                    <div class="card-body py-2" id="outgoingRequests">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для уведомлений -->
<div class="modal fade" id="notificationModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="notificationModalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="notificationModalMessage"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
